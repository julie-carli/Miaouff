# CI/CD pipeline for Python backend with pytest
# Triggered on every push and pull request to main branch
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      # Database URL injected from GitHub Secrets (never hardcode credentials)
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Added: MongoDB URI now injected into the CI environment
      MONGODB_URI: ${{ secrets.MONGODB_URI }}

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Lint code quality check with flake8
      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop on critical errors (E9=syntax, F63=assertions, F7=statements, F82=undefined names)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues without failing the pipeline
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Step 5: Run pytest and generate an XML report for traceability
      - name: Run tests with pytest
        run: |
          pip install pytest pytest-cov
          pytest --cov=. --cov-report=xml --cov-report=term-missing -v

      # Step 6: Upload the coverage report as a build artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml