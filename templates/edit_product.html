{% extends "base.html" %}
{% block title %}Modifier — {{ product.name }} — Miaouff{% endblock %}
{% block content %}

<!-- ============================================================
   Admin panel — Edit a single product
   ============================================================ -->
<main class="admin-page">

    <div class="admin-header">
        <h1 class="admin-title">✏️ Modifier un produit</h1>
        <a href="{{ url_for('edit_products') }}" class="admin-back-link">← Retour aux produits</a>
    </div>

    <section class="admin-section">
        <form method="POST" class="admin-form">
            <div class="admin-form-grid">
                <div class="admin-field">
                    <label for="name">Nom du produit</label>
                    <input type="text" name="name" id="name" value="{{ product.name }}" required>
                </div>
                <div class="admin-field">
                    <label for="category_id">Catégorie</label>
                    <select name="category_id" id="category_id">
                        {% for category in categories %}
                        <option value="{{ category.category_id }}"
                            {% if product.category_id == category.category_id %}selected{% endif %}>
                            {{ category.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="admin-field">
                    <label for="price_excl_tax">Prix HT (€)</label>
                    <input type="number" step="0.01" name="price_excl_tax" id="price_excl_tax" value="{{ product.price_excl_tax }}" required>
                </div>
                <div class="admin-field">
                    <label for="price_incl_tax">Prix TTC (€)</label>
                    <input type="number" step="0.01" name="price_incl_tax" id="price_incl_tax" value="{{ product.price_incl_tax }}" required>
                </div>
                <div class="admin-field">
                    <label for="stock">Stock</label>
                    <input type="number" name="stock" id="stock" value="{{ product.stock }}" required>
                </div>
                <div class="admin-field">
                    <label for="weight">Poids (kg)</label>
                    <input type="number" step="0.01" name="weight" id="weight" value="{{ product.weight }}" required>
                </div>
                <div class="admin-field admin-field--full">
                    <label for="image">URL de l'image</label>
                    <input type="text" name="image" id="image" value="{{ product.image }}">
                </div>
                <div class="admin-field admin-field--full">
                    <label for="description">Description</label>
                    <textarea name="description" id="description" rows="4">{{ product.description }}</textarea>
                </div>
            </div>
            <button type="submit" class="admin-submit-btn">💾 Sauvegarder les modifications</button>
        </form>
    </section>

</main>

{% endblock %}
