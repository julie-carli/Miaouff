{% extends "base.html" %}
{% block title %}Modifier l'Animal — Miaouff{% endblock %}
{% block content %}

<!-- ============================================================
   Admin panel — Edit a single adoptable pet
   ============================================================ -->
<main class="admin-page">

    <div class="admin-header">
        <h1 class="admin-title">✏️ Modifier un animal</h1>
        <a href="{{ url_for('edit_pets') }}" class="admin-back-link">← Retour aux animaux</a>
    </div>

    <section class="admin-section">
        <form method="POST" class="admin-form">
            <div class="admin-form-grid">
                <div class="admin-field">
                    <label for="name">Nom</label>
                    <input type="text" name="name" id="name"
                           value="{{ pet.name }}" required>
                </div>
                <div class="admin-field">
                    <label for="age">Âge (ans)</label>
                    <input type="number" name="age" id="age"
                           value="{{ pet.age }}" required>
                </div>
                <div class="admin-field">
                    <label for="gender">Genre</label>
                    <select name="gender" id="gender" required>
                        <option value="Male" {% if pet.gender == 'Male' %}selected{% endif %}>Mâle</option>
                        <option value="Female" {% if pet.gender == 'Female' %}selected{% endif %}>Femelle</option>
                    </select>
                </div>
                <div class="admin-field">
                    <label for="adoption_date">Date d'adoption
                        <span class="admin-field-hint">(laisser vide si disponible)</span>
                    </label>
                    <input type="date" name="adoption_date" id="adoption_date"
                           value="{{ pet.adoption_date or '' }}">
                </div>
                <div class="admin-field admin-field--full">
                    <label for="image">URL de l'image</label>
                    <input type="text" name="image" id="image"
                           value="{{ pet.image }}">
                </div>
                <div class="admin-field admin-field--full">
                    <label for="description">Description</label>
                    <textarea name="description" id="description"
                              rows="3">{{ pet.description }}</textarea>
                </div>
                <div class="admin-field">
                    <label for="shelter_id">Refuge</label>
                    <select name="shelter_id" id="shelter_id" required>
                        {% for shelter in shelters %}
                        <option value="{{ shelter.shelter_id }}"
                            {% if pet.shelter_id == shelter.shelter_id %}selected{% endif %}>
                            {{ shelter.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="admin-field">
                    <label for="animal_id">Espèce / Race</label>
                    <select name="animal_id" id="animal_id" required>
                        {% for animal in animals %}
                        <option value="{{ animal.animal_id }}"
                            {% if pet.animal_id == animal.animal_id %}selected{% endif %}>
                            {{ animal.species }} — {{ animal.breed }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <button type="submit" class="admin-submit-btn">💾 Sauvegarder les modifications</button>
        </form>
    </section>

</main>

{% endblock %}
