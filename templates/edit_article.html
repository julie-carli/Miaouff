{% extends "base.html" %}
{% block title %}Modifier l'article — Miaouff{% endblock %}
{% block content %}

<!-- ============================================================
   Admin panel — Edit a single blog article
   ============================================================ -->
<main class="admin-page">

    <div class="admin-header">
        <h1 class="admin-title">✏️ Modifier un article</h1>
        <a href="{{ url_for('edit_articles') }}" class="admin-back-link">← Retour au blog</a>
    </div>

    <section class="admin-section">
        <form method="POST" enctype="multipart/form-data" class="admin-form">
            <div class="admin-form-grid">
                <div class="admin-field admin-field--full">
                    <label for="title">Titre</label>
                    <input type="text" name="title" id="title" value="{{ article['title'] }}" required>
                </div>
                <div class="admin-field admin-field--full">
                    <label for="content">Contenu</label>
                    <textarea name="content" id="content" rows="8" required>{{ article['content'] }}</textarea>
                </div>
                <div class="admin-field">
                    <label for="image">Nouvelle image <span class="admin-field-hint">(laisser vide pour conserver l'actuelle)</span></label>
                    <input type="file" name="image" id="image" accept="image/*">
                </div>
                <div class="admin-field">
                    <label for="shelter_id">Refuge associé</label>
                    <select name="shelter_id" id="shelter_id">
                        <option value="">Aucun refuge associé</option>
                        {% for shelter in shelters %}
                        <option value="{{ shelter.shelter_id }}"
                            {% if shelter.shelter_id == article['shelter_id'] %}selected{% endif %}>
                            {{ shelter.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <button type="submit" class="admin-submit-btn">💾 Mettre à jour</button>
        </form>
    </section>

</main>

{% endblock %}
