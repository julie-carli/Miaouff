{% extends "base.html" %}

{% block content %}
<section class="contact-section">

    <div class="contact-header">
        <h1 class="contact-title">Nous contacter</h1>
        <p class="contact-intro">Une question, une adoption, un signalement ? On vous répond vite 🐾</p>
    </div>

    <!-- Tally embedded form inside a clean card -->
    <div class="contact-card">
        <iframe
            data-tally-src="https://tally.so/embed/nPBXq1?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
            loading="lazy"
            width="100%"
            height="361"
            frameborder="0"
            marginheight="0"
            marginwidth="0"
            title="Formulaire de contact Miaouff">
        </iframe>
    </div>

</section>

<!-- Tally embed script -->
<script>
    var d = document,
        w = "https://tally.so/widgets/embed.js",
        v = function () {
            "undefined" != typeof Tally
                ? Tally.loadEmbeds()
                : d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function (e) {
                      e.src = e.dataset.tallySrc;
                  });
        };
    if ("undefined" != typeof Tally) v();
    else if (d.querySelector('script[src="' + w + '"]') == null) {
        var s = d.createElement("script");
        s.src = w;
        s.onload = v;
        s.onerror = v;
        d.body.appendChild(s);
    }
</script>

{% endblock %}
