{% extends "base.html" %}

{% block content %}

<!-- ============================================================
   Quiz game page
   JS logic handled in static/js/quiz.js — do not modify
   ============================================================ -->
<main class="quiz-page">

    <h1 class="game-page-title">Quiz — Testez vos connaissances sur les animaux !</h1>

    <div class="quiz-container">
        <div class="quiz-progress">
            <div class="quiz-progress-bar"></div>
        </div>

        <div class="quiz-box">
            <h2 class="quiz-question">Chargement des questions...</h2>
            <div class="quiz-options"></div>
        </div>

        <div class="quiz-buttons">
            <button class="quiz-check">Vérifier</button>
            <button class="quiz-next" style="display: none;">Suivant</button>
            <button class="quiz-submit" style="display: none;">Envoyer</button>
        </div>

        <div class="quiz-score" style="display: none;">
            <span class="score-value"></span>
        </div>
    </div>

</main>

<script src="{{ url_for('static', filename='js/quiz.js') }}"></script>

{% endblock %}
