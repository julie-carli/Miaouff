{% extends "base.html" %}
{% block title %}Modifier l'utilisateur — Miaouff{% endblock %}
{% block content %}

<!-- ============================================================
   Admin panel — Edit a single user
   Sections: personal info, address, password reset
   ============================================================ -->
<main class="admin-page">

    <div class="admin-header">
        <h1 class="admin-title">✏️ Modifier un utilisateur</h1>
        <a href="{{ url_for('edit_users') }}" class="admin-back-link">← Retour aux utilisateurs</a>
    </div>

    <form method="POST" action="{{ url_for('edit_user', user_id=user.user_id) }}">

        <!-- ---- Personal info ---- -->
        <section class="admin-section">
            <h2 class="admin-section-title">Informations personnelles</h2>
            <div class="admin-form-grid">
                <div class="admin-field">
                    <label for="first_name">Prénom</label>
                    <input type="text" name="first_name" id="first_name"
                           value="{{ user.first_name or '' }}" required>
                </div>
                <div class="admin-field">
                    <label for="last_name">Nom</label>
                    <input type="text" name="last_name" id="last_name"
                           value="{{ user.last_name or '' }}" required>
                </div>
                <div class="admin-field">
                    <label for="birth_date">Date de naissance</label>
                    <input type="date" name="birth_date" id="birth_date"
                           value="{{ user.birth_date.strftime('%Y-%m-%d') if user.birth_date else '' }}">
                </div>
                <div class="admin-field">
                    <label for="phone">Téléphone</label>
                    <input type="text" name="phone" id="phone"
                           value="{{ user.phone or '' }}">
                </div>
                <div class="admin-field admin-field--full">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email"
                           value="{{ user.email or '' }}" required>
                </div>
                <div class="admin-field admin-field--full">
                    <label>Mot de passe</label>
                    <div>
                        <a href="{{ url_for('send_reset_code', user_id=user.user_id) }}"
                           class="admin-btn admin-btn--edit">
                            🔑 Envoyer un code de réinitialisation
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <!-- ---- Address ---- -->
        <section class="admin-section">
            <h2 class="admin-section-title">Adresse de livraison</h2>
            <div class="admin-form-grid">
                <div class="admin-field">
                    <label for="address_number">Numéro</label>
                    <input type="text" name="address_number" id="address_number"
                           value="{{ user.address_number or '' }}">
                </div>
                <div class="admin-field">
                    <label for="postal_code">Code postal</label>
                    <input type="text" name="postal_code" id="postal_code"
                           value="{{ user.postal_code or '' }}">
                </div>
                <div class="admin-field admin-field--full">
                    <label for="street_name">Rue</label>
                    <input type="text" name="street_name" id="street_name"
                           value="{{ user.street_name or '' }}">
                </div>
                <div class="admin-field admin-field--full">
                    <label for="address_complement">Complément d'adresse</label>
                    <input type="text" name="address_complement" id="address_complement"
                           value="{{ user.address_complement or '' }}">
                </div>
                <div class="admin-field">
                    <label for="city">Ville</label>
                    <input type="text" name="city" id="city"
                           value="{{ user.city or '' }}">
                </div>
                <div class="admin-field">
                    <label for="country">Pays</label>
                    <input type="text" name="country" id="country"
                           value="{{ user.country or '' }}">
                </div>
            </div>
        </section>

        <button type="submit" class="admin-submit-btn">💾 Enregistrer les modifications</button>

    </form>

</main>

{% endblock %}
