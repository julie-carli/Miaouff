{% extends "base.html" %}

{% block title %}Page introuvable{% endblock %}

{% block content %}
<div class="error-container">

    <!-- Left column: image with rounded corners and slight tilt -->
    <img src="{{ url_for('static', filename='images/404.png') }}" alt="Erreur 404" class="error-image">

    <!-- Right column: decorative number + title + message + button -->
    <div class="error-text">
        <p class="error-big">404</p>
        <h1 class="error-title">Page introuvable</h1>
        <p class="error-message">Oups ! On a cherché partout... même sous le canapé 🐾<br>Cette page n'existe pas (ou plus).</p>
        <a href="{{ url_for('home') }}" class="error-button">Retour à l'accueil</a>
    </div>

</div>
{% endblock %}
