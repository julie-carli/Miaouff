{% extends "base.html" %}

{% block title %}Modifier mon profil — Miaouff{% endblock %}

{% block content %}

<!-- ============================================================
   Edit personal profile — name, birth date, phone
   ============================================================ -->
<main class="address-page">

    <div class="address-card">
        <h1 class="checkout-title">Informations personnelles</h1>

        <form method="POST" action="{{ url_for('edit_profile') }}" class="address-form">

            <div class="address-row">
                <div class="address-field">
                    <label for="first_name">Prénom</label>
                    <input type="text" id="first_name" name="first_name"
                           value="{{ current_user.first_name or '' }}">
                </div>
                <div class="address-field">
                    <label for="last_name">Nom</label>
                    <input type="text" id="last_name" name="last_name"
                           value="{{ current_user.last_name or '' }}">
                </div>
            </div>

            <div class="address-field">
                <label for="birth_date">Date de naissance</label>
                <input type="date" id="birth_date" name="birth_date"
                       value="{{ current_user.birth_date or '' }}">
            </div>

            <div class="address-field">
                <label for="phone">Téléphone</label>
                <input type="tel" id="phone" name="phone"
                       value="{{ current_user.phone or '' }}">
            </div>

            <div class="address-field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       value="{{ current_user.email }}" required>
            </div>

            <button type="submit" class="cart-checkout-btn">
                Enregistrer
            </button>

        </form>

        <div class="profile-password-section">
            <h2 class="checkout-section-title">Changer de mot de passe</h2>
            <form method="POST" action="{{ url_for('change_password') }}" class="address-form">
                <div class="address-field">
                    <label for="current_password">Mot de passe actuel</label>
                    <input type="password" id="current_password" name="current_password" required>
                </div>
                <div class="address-field">
                    <label for="new_password">Nouveau mot de passe</label>
                    <input type="password" id="new_password" name="new_password" required>
                </div>
                <div class="address-field">
                    <label for="confirm_password">Confirmer le nouveau mot de passe</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
                <button type="submit" class="cart-checkout-btn">
                    Changer le mot de passe
                </button>
            </form>
        </div>

        <a href="{{ url_for('account') }}" class="product-detail-back" style="margin-top:1rem;display:block;">
            ← Retour au compte
        </a>
    </div>

</main>

{% endblock %}
