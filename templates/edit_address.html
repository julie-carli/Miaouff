{% extends "base.html" %}

{% block title %}Mon adresse — Miaouff{% endblock %}

{% block content %}

<!-- ============================================================
   Delivery address form — saved to the user account
   Redirects back to check_order on save
   ============================================================ -->
<main class="address-page">

    <div class="address-card">
        <h1 class="checkout-title">Adresse de livraison</h1>
        <p class="checkout-stripe-note">
            Cette adresse sera utilisée pour la livraison et sauvegardée sur votre compte.
        </p>

        <form method="POST" action="{{ url_for('edit_address') }}" class="address-form">

            <div class="address-row">
                <div class="address-field">
                    <label for="first_name">Prénom</label>
                    <input type="text" id="first_name" name="first_name"
                           value="{{ user.first_name or '' }}" required>
                </div>
                <div class="address-field">
                    <label for="last_name">Nom</label>
                    <input type="text" id="last_name" name="last_name"
                           value="{{ user.last_name or '' }}" required>
                </div>
            </div>

            <div class="address-row">
                <div class="address-field address-field--sm">
                    <label for="address_number">N°</label>
                    <input type="text" id="address_number" name="address_number"
                           value="{{ user.address_number or '' }}" required>
                </div>
                <div class="address-field">
                    <label for="street_name">Rue</label>
                    <input type="text" id="street_name" name="street_name"
                           value="{{ user.street_name or '' }}" required>
                </div>
            </div>

            <div class="address-field">
                <label for="address_complement">Complément d'adresse</label>
                <input type="text" id="address_complement" name="address_complement"
                       value="{{ user.address_complement or '' }}"
                       placeholder="Appartement, bâtiment… (optionnel)">
            </div>

            <div class="address-row">
                <div class="address-field address-field--sm">
                    <label for="postal_code">Code postal</label>
                    <input type="text" id="postal_code" name="postal_code"
                           value="{{ user.postal_code or '' }}" required>
                </div>
                <div class="address-field">
                    <label for="city">Ville</label>
                    <input type="text" id="city" name="city"
                           value="{{ user.city or '' }}" required>
                </div>
            </div>

            <div class="address-field">
                <label for="country">Pays</label>
                <input type="text" id="country" name="country"
                       value="{{ user.country or '' }}" required>
            </div>

            <div class="address-field">
                <label for="phone">Téléphone</label>
                <input type="tel" id="phone" name="phone"
                       value="{{ user.phone or '' }}"
                       placeholder="Optionnel, pour la livraison">
            </div>

            <button type="submit" class="cart-checkout-btn">
                Enregistrer et continuer →
            </button>

        </form>
    </div>

</main>

{% endblock %}
